# Machine-readable config catalog for Seceda.
#
# This file is intentionally tool-friendly. It is meant to describe the knobs in
# `seceda.toml` plus the supported CLI overrides so future CLI/TUI/GUI surfaces
# can all read from the same metadata source.

schema_version = 1

[[fields]]
key = "runtime.config_path"
group = "Core options"
label = "Config file path"
description = "Path to the main Seceda TOML config file."
type = "string"
cli_flag = "--config"
cli_value_name = "PATH"
default = "seceda_edge/config/seceda.toml"
advanced = false
requires_restart = false

[[fields]]
key = "runtime.no_config"
group = "Core options"
label = "Disable config file loading"
description = "Skip loading a TOML config file and use only built-in defaults plus overrides."
type = "boolean"
cli_flag = "--no-config"
default = "false"
advanced = true
requires_restart = false

[[fields]]
key = "daemon.host"
group = "Core options"
label = "Bind host"
description = "Host interface for the edge daemon HTTP server."
type = "string"
cli_flag = "--host"
cli_value_name = "HOST"
config_path = "daemon.host"
default = "0.0.0.0"
tui_field_id = "daemon.host"

[[fields]]
key = "daemon.port"
group = "Core options"
label = "Bind port"
description = "Port for the edge daemon HTTP server."
type = "integer"
cli_flag = "--port"
cli_value_name = "PORT"
config_path = "daemon.port"
default = "8080"
min = "1"
max = "65535"
tui_field_id = "daemon.port"

[[fields]]
key = "daemon.public_model_alias"
group = "Core options"
label = "Public model alias"
description = "Primary OpenAI model id exposed by the daemon for the default route."
type = "string"
cli_flag = "--public-model-alias"
cli_value_name = "NAME"
config_path = "daemon.public_model_alias"
default = "seceda/default"
tui_field_id = "daemon.public_model_alias"

[[fields]]
key = "daemon.default_system_prompt"
group = "Core options"
label = "Default system prompt"
description = "Prepended to requests that do not already contain a system-like message."
type = "string"
cli_flag = "--system-prompt"
cli_value_name = "TEXT"
config_path = "daemon.default_system_prompt"
tui_field_id = "daemon.default_system_prompt"

[[fields]]
key = "daemon.warmup_prompt"
group = "Core options"
label = "Warmup prompt"
description = "Prompt used to warm local runtimes after load or reload."
type = "string"
cli_flag = "--warmup-prompt"
cli_value_name = "TEXT"
config_path = "daemon.warmup_prompt"
default = "Hello from Seceda."
tui_field_id = "daemon.warmup_prompt"

[[fields]]
key = "local.active.model_path"
group = "Local runtime"
label = "Local model path"
description = "Filesystem path to the active in-process GGUF model."
type = "string"
cli_flag = "--model-path"
cli_value_name = "PATH"
config_path = "local.engines.<active>.model_path"
tui_field_id = "local.active.model_path"

[[fields]]
key = "local.active.engine_id"
group = "Local runtime"
label = "Local engine id"
description = "Stable engine identifier for the active local runtime."
type = "string"
cli_flag = "--local-engine-id"
cli_value_name = "ID"
config_path = "local.engines.<active>.engine_id"
default = "local/llama.cpp"
tui_field_id = "local.active.engine_id"

[[fields]]
key = "local.active.backend_id"
group = "Local runtime"
label = "Local backend id"
description = "Stable backend identifier for the active local runtime."
type = "string"
cli_flag = "--local-backend-id"
cli_value_name = "ID"
config_path = "local.engines.<active>.backend_id"
default = "local"
tui_field_id = "local.active.backend_id"

[[fields]]
key = "local.active.model_id"
group = "Local runtime"
label = "Local model id"
description = "Runtime model identity reported for the active local runtime."
type = "string"
cli_flag = "--local-model-id"
cli_value_name = "ID"
config_path = "local.engines.<active>.model_id"
default = "local-default"
tui_field_id = "local.active.model_id"

[[fields]]
key = "local.active.model_alias"
group = "Local runtime"
label = "Local model alias"
description = "OpenAI model alias that explicitly selects the active local runtime."
type = "string"
cli_flag = "--local-model-alias"
cli_value_name = "NAME"
config_path = "local.engines.<active>.model_alias"
default = "local/default"
tui_field_id = "local.active.model_alias"

[[fields]]
key = "local.active.display_name"
group = "Local runtime"
label = "Local display name"
description = "Human-readable display name for the active local runtime."
type = "string"
cli_flag = "--local-display-name"
cli_value_name = "TEXT"
config_path = "local.engines.<active>.display_name"
default = "Seceda local llama.cpp"
tui_field_id = "local.active.display_name"

[[fields]]
key = "local.active.execution_mode"
group = "Local runtime"
label = "Local execution mode"
description = "Execution mode for the active local runtime."
type = "string"
cli_flag = "--local-execution-mode"
cli_value_name = "MODE"
config_path = "local.engines.<active>.execution_mode"
default = "in_process"
enum_values = ["in_process", "sdk_bridge", "sidecar_server"]
tui_field_id = "local.active.execution_mode"

[[fields]]
key = "local.active.sidecar_base_url"
group = "Local runtime"
label = "Local sidecar base URL"
description = "Base URL for an externally managed localhost OpenAI-compatible sidecar server."
type = "string"
cli_flag = "--local-sidecar-base-url"
cli_value_name = "URL"
config_path = "local.engines.<active>.sidecar_base_url"
experimental = true
tui_field_id = "local.active.sidecar_base_url"

[[fields]]
key = "local.active.sidecar_timeout_seconds"
group = "Local runtime"
label = "Local sidecar timeout"
description = "Request timeout for the local sidecar adapter."
type = "integer"
cli_flag = "--local-sidecar-timeout-seconds"
cli_value_name = "N"
config_path = "local.engines.<active>.sidecar_timeout_seconds"
default = "120"
min = "1"
tui_field_id = "local.active.sidecar_timeout_seconds"

[[fields]]
key = "local.active.sidecar_connect_timeout_seconds"
group = "Local runtime"
label = "Local sidecar connect timeout"
description = "Connection timeout for the local sidecar adapter."
type = "integer"
cli_flag = "--local-sidecar-connect-timeout-seconds"
cli_value_name = "N"
config_path = "local.engines.<active>.sidecar_connect_timeout_seconds"
default = "10"
min = "1"
tui_field_id = "local.active.sidecar_connect_timeout_seconds"

[[fields]]
key = "local.active.sidecar_verify_tls"
group = "Local runtime"
label = "Local sidecar TLS verification"
description = "Whether HTTPS certificate verification is required for the local sidecar adapter."
type = "boolean"
cli_flag = "--local-sidecar-verify-tls"
cli_value_name = "true|false"
config_path = "local.engines.<active>.sidecar_verify_tls"
default = "true"
tui_field_id = "local.active.sidecar_verify_tls"

[[fields]]
key = "catalog.local_engine"
group = "Local runtime"
label = "Named local engine spec"
description = "Repeatable local engine catalog entry in key=value form for one-off CLI additions."
type = "spec"
cli_flag = "--local-engine"
cli_value_name = "SPEC"
config_path = "local.engines.<name>"
advanced = true
experimental = true

[[fields]]
key = "local.active.context_size"
group = "Local llama.cpp"
label = "Context size"
description = "Context window for the active in-process llama.cpp runtime."
type = "integer"
cli_flag = "--n-ctx"
cli_value_name = "N"
config_path = "local.engines.<active>.context_size"
default = "2048"
min = "1"
tui_field_id = "local.active.context_size"

[[fields]]
key = "local.active.batch_size"
group = "Local llama.cpp"
label = "Batch size"
description = "Prompt processing batch size for the active in-process llama.cpp runtime."
type = "integer"
cli_flag = "--n-batch"
cli_value_name = "N"
config_path = "local.engines.<active>.batch_size"
default = "2048"
min = "1"
tui_field_id = "local.active.batch_size"

[[fields]]
key = "local.active.n_gpu_layers"
group = "Local llama.cpp"
label = "GPU layers"
description = "Number of transformer layers offloaded to GPU for the active in-process runtime."
type = "integer"
cli_flag = "--n-gpu-layers"
cli_value_name = "N"
config_path = "local.engines.<active>.n_gpu_layers"
default = "99"
tui_field_id = "local.active.n_gpu_layers"

[[fields]]
key = "local.active.n_threads"
group = "Local llama.cpp"
label = "Threads"
description = "CPU thread count for the active in-process runtime."
type = "integer"
cli_flag = "--n-threads"
cli_value_name = "N"
config_path = "local.engines.<active>.n_threads"
default = "-1"
tui_field_id = "local.active.n_threads"

[[fields]]
key = "local.active.n_threads_batch"
group = "Local llama.cpp"
label = "Batch threads"
description = "CPU thread count used during prompt batching for the active in-process runtime."
type = "integer"
cli_flag = "--n-threads-batch"
cli_value_name = "N"
config_path = "local.engines.<active>.n_threads_batch"
default = "-1"
tui_field_id = "local.active.n_threads_batch"

[[fields]]
key = "generation.max_completion_tokens"
group = "Generation defaults"
label = "Default max tokens"
description = "Default maximum completion token budget for incoming requests."
type = "integer"
cli_flag = "--default-max-tokens"
cli_value_name = "N"
config_path = "generation.max_completion_tokens"
default = "128"
min = "1"
tui_field_id = "generation.max_completion_tokens"

[[fields]]
key = "generation.temperature"
group = "Generation defaults"
label = "Default temperature"
description = "Default temperature for incoming requests when omitted by the caller."
type = "float"
cli_flag = "--default-temperature"
cli_value_name = "FLOAT"
config_path = "generation.temperature"
default = "0.7"
tui_field_id = "generation.temperature"

[[fields]]
key = "generation.top_p"
group = "Generation defaults"
label = "Default top-p"
description = "Default nucleus sampling top-p value."
type = "float"
cli_flag = "--default-top-p"
cli_value_name = "FLOAT"
config_path = "generation.top_p"
default = "0.9"
tui_field_id = "generation.top_p"

[[fields]]
key = "generation.top_k"
group = "Generation defaults"
label = "Default top-k"
description = "Default top-k sampling value."
type = "integer"
cli_flag = "--default-top-k"
cli_value_name = "N"
config_path = "generation.top_k"
default = "40"
tui_field_id = "generation.top_k"

[[fields]]
key = "generation.min_p"
group = "Generation defaults"
label = "Default min-p"
description = "Default minimum probability cutoff for sampling."
type = "float"
cli_flag = "--default-min-p"
cli_value_name = "FLOAT"
config_path = "generation.min_p"
default = "0.05"
tui_field_id = "generation.min_p"

[[fields]]
key = "generation.seed"
group = "Generation defaults"
label = "Default seed"
description = "Default sampling seed; 4294967295 keeps the current upstream default behavior."
type = "integer"
cli_flag = "--default-seed"
cli_value_name = "N"
config_path = "generation.seed"
default = "4294967295"
tui_field_id = "generation.seed"

[[fields]]
key = "router.max_prompt_chars"
group = "Router"
label = "Max prompt chars"
description = "Prompt character budget above which requests are routed to cloud by heuristic."
type = "integer"
cli_flag = "--router-max-chars"
cli_value_name = "N"
config_path = "router.max_prompt_chars"
default = "800"
min = "1"
tui_field_id = "router.max_prompt_chars"

[[fields]]
key = "router.max_estimated_tokens"
group = "Router"
label = "Max estimated tokens"
description = "Estimated token budget above which requests are routed to cloud by heuristic."
type = "integer"
cli_flag = "--router-max-estimated-tokens"
cli_value_name = "N"
config_path = "router.max_estimated_tokens"
default = "256"
min = "1"
tui_field_id = "router.max_estimated_tokens"

[[fields]]
key = "router.structured_keywords"
group = "Router"
label = "Structured keywords"
description = "Keyword list that hints at structured-output or coding-heavy tasks."
type = "csv"
cli_flag = "--router-structured-keywords"
cli_value_name = "a,b,c"
config_path = "router.structured_keywords"
tui_field_id = "router.structured_keywords"

[[fields]]
key = "router.cloud_keywords"
group = "Router"
label = "Cloud keywords"
description = "Keyword list that hints at cloud-heavy reasoning tasks."
type = "csv"
cli_flag = "--router-cloud-keywords"
cli_value_name = "a,b,c"
config_path = "router.cloud_keywords"
tui_field_id = "router.cloud_keywords"

[[fields]]
key = "router.freshness_keywords"
group = "Router"
label = "Freshness keywords"
description = "Keyword list that hints at time-sensitive tasks."
type = "csv"
cli_flag = "--router-freshness-keywords"
cli_value_name = "a,b,c"
config_path = "router.freshness_keywords"
tui_field_id = "router.freshness_keywords"

[[fields]]
key = "remote.default.base_url"
group = "Remote backends"
label = "Default cloud base URL"
description = "Base URL for the default remote OpenAI-compatible backend."
type = "string"
cli_flag = "--cloud-base-url"
cli_value_name = "URL"
config_path = "remote.backends.<default>.base_url"
tui_field_id = "remote.default.base_url"

[[fields]]
key = "remote.default.backend_id"
group = "Remote backends"
label = "Default cloud backend id"
description = "Stable backend identifier for the default remote backend."
type = "string"
cli_flag = "--cloud-backend-id"
cli_value_name = "ID"
config_path = "remote.backends.<default>.backend_id"
default = "remote/modal-default"
tui_field_id = "remote.default.backend_id"

[[fields]]
key = "remote.default.model"
group = "Remote backends"
label = "Default cloud model id"
description = "Upstream model id sent to the default remote backend."
type = "string"
cli_flag = "--cloud-model"
cli_value_name = "NAME"
config_path = "remote.backends.<default>.model"
default = "seceda-cloud-default"
tui_field_id = "remote.default.model"

[[fields]]
key = "remote.default.model_alias"
group = "Remote backends"
label = "Default cloud model alias"
description = "OpenAI model alias that explicitly selects the default remote backend."
type = "string"
cli_flag = "--cloud-model-alias"
cli_value_name = "NAME"
config_path = "remote.backends.<default>.model_alias"
default = "remote/default"
tui_field_id = "remote.default.model_alias"

[[fields]]
key = "remote.default.display_name"
group = "Remote backends"
label = "Default cloud display name"
description = "Human-readable display name for the default remote backend."
type = "string"
cli_flag = "--cloud-display-name"
cli_value_name = "TEXT"
config_path = "remote.backends.<default>.display_name"
default = "Seceda remote backend"
tui_field_id = "remote.default.display_name"

[[fields]]
key = "remote.default.api_key"
group = "Remote backends"
label = "Cloud API key"
description = "Bearer token for the default remote backend; environment variables are usually preferred."
type = "string"
cli_flag = "--cloud-api-key"
cli_value_name = "KEY"
config_path = "remote.backends.<default>.api_key"
env_var = "SECEDA_CLOUD_API_KEY"
sensitive = true
tui_field_id = "remote.default.api_key"

[[fields]]
key = "remote.default.timeout_seconds"
group = "Remote backends"
label = "Cloud timeout"
description = "Overall request timeout for the default remote backend."
type = "integer"
cli_flag = "--cloud-timeout-seconds"
cli_value_name = "N"
config_path = "remote.backends.<default>.timeout_seconds"
default = "120"
min = "1"
tui_field_id = "remote.default.timeout_seconds"

[[fields]]
key = "remote.default.connect_timeout_seconds"
group = "Remote backends"
label = "Cloud connect timeout"
description = "Connection timeout for the default remote backend."
type = "integer"
cli_flag = "--cloud-connect-timeout-seconds"
cli_value_name = "N"
config_path = "remote.backends.<default>.connect_timeout_seconds"
default = "10"
min = "1"
tui_field_id = "remote.default.connect_timeout_seconds"

[[fields]]
key = "remote.default.retry_attempts"
group = "Remote backends"
label = "Cloud retry attempts"
description = "Retry attempts for the default remote backend."
type = "integer"
cli_flag = "--cloud-retry-attempts"
cli_value_name = "N"
config_path = "remote.backends.<default>.retry_attempts"
default = "2"
min = "0"
tui_field_id = "remote.default.retry_attempts"

[[fields]]
key = "remote.default.retry_backoff_ms"
group = "Remote backends"
label = "Cloud retry backoff"
description = "Retry backoff interval for the default remote backend."
type = "integer"
cli_flag = "--cloud-retry-backoff-ms"
cli_value_name = "N"
config_path = "remote.backends.<default>.retry_backoff_ms"
default = "1000"
min = "0"
units = "ms"
tui_field_id = "remote.default.retry_backoff_ms"

[[fields]]
key = "remote.default.send_modal_session_id"
group = "Remote backends"
label = "Cloud Modal session ids"
description = "Whether Seceda should send a request-scoped Modal-Session-ID header to the default remote backend."
type = "boolean"
cli_flag = "--cloud-send-modal-session-id"
cli_value_name = "true|false"
config_path = "remote.backends.<default>.send_modal_session_id"
default = "false"
tui_field_id = "remote.default.send_modal_session_id"

[[fields]]
key = "remote.default.verify_tls"
group = "Remote backends"
label = "Cloud TLS verification"
description = "Whether HTTPS certificate verification is required for the default remote backend."
type = "boolean"
cli_flag = "--cloud-verify-tls"
cli_value_name = "true|false"
config_path = "remote.backends.<default>.verify_tls"
default = "true"
tui_field_id = "remote.default.verify_tls"

[[fields]]
key = "catalog.remote_backend"
group = "Remote backends"
label = "Named remote backend spec"
description = "Repeatable remote backend catalog entry in key=value form for one-off CLI additions."
type = "spec"
cli_flag = "--remote-backend"
cli_value_name = "SPEC"
config_path = "remote.backends.<name>"
advanced = true
experimental = true

[[fields]]
key = "catalog.exposed_model"
group = "Exposed models"
label = "Exposed model spec"
description = "Repeatable exposed model entry in key=value form for one-off CLI additions."
type = "spec"
cli_flag = "--exposed-model"
cli_value_name = "SPEC"
config_path = "exposed_models[]"
advanced = true
experimental = true

[[fields]]
key = "observability.event_log_capacity"
group = "Observability"
label = "Event log capacity"
description = "Maximum number of recent inference events retained in memory."
type = "integer"
cli_flag = "--event-log-capacity"
cli_value_name = "N"
config_path = "observability.event_log_capacity"
default = "2048"
min = "1"
hot_reloadable = true
requires_restart = false
tui_field_id = "observability.event_log_capacity"
