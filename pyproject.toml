[tool.uv.workspace]
members = [
    "seceda_cloud",
    "seceda_edge",
]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
]

# ExecuTorch's C++ build (EXECUTORCH_BUILD_KERNELS_OPTIMIZED) probes PyTorch via
# the interpreter passed to CMake. Install with:
#   uv sync --group executorch-build
executorch-build = [
    "torch",
    "huggingface-hub",
    "pyyaml",
]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = [
    "seceda_cloud/tests",
    "seceda_edge/tests",
]
